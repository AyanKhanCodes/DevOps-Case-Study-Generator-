name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint & Test
        run: npm run test

      - name: Build Docker Image
        run: docker build -t devopsproject-casestudygenerator:latest .

      - name: Security Scan (Mock)
        run: echo "Running Trivy vulnerability scanner..."
