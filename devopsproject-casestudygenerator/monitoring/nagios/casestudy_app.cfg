define host {
    use                     linux-server
    host_name               casestudy-webserver
    alias                   Case Study Generator App Server
    address                 127.0.0.1
}

define service {
    use                     generic-service
    host_name               casestudy-webserver
    service_description     HTTP Port 8080 Check
    check_command           check_http!-I 127.0.0.1 -p 8080
    check_interval          5
    retry_interval          1
    max_check_attempts      3
}

define service {
    use                     generic-service
    host_name               casestudy-webserver
    service_description     Docker Daemon Check
    check_command           check_procs!-c 1: -C dockerd
    check_interval          5
    retry_interval          1
    max_check_attempts      3
}
