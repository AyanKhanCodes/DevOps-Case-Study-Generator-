version: "3.8"

services:
  casestudy-app:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
    container_name: devops-casestudy-generator
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - sqlite-data:/app/prisma
    restart: unless-stopped

volumes:
  sqlite-data:
    driver: local
